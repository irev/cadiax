name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-and-release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -e .[dev]

      - name: Compile sources
        run: python -m compileall src tests

      - name: Run test suite
        run: |
          pytest -q tests/test_autonomous_stability.py
          pytest -q tests/test_setup_wizard.py

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: monitoring-dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: monitoring-dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: monitoring-dashboard
        run: npm run build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Validation

            - `python -m compileall src tests`
            - `pytest -q tests/test_autonomous_stability.py`
            - `pytest -q tests/test_setup_wizard.py`
            - `npm run build` in `monitoring-dashboard/`
