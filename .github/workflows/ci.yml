name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -e .[dev]

      - name: Compile sources
        run: python -m compileall src tests

      - name: Run stability tests
        run: pytest -q tests/test_autonomous_stability.py

      - name: Run setup tests
        run: pytest -q tests/test_setup_wizard.py

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitoring-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: monitoring-dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
