name: Feature request
description: Propose an enhancement for Cadiax
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for new capabilities, workflow improvements, UX updates, or documentation changes.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the desired behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful when tradeoffs matter.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and what changes operationally?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime
        - Skills
        - Memory
        - Privacy
        - Channels
        - Dashboard
        - Documentation
        - Tooling
    validations:
      required: true
